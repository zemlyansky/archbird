name: Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Install pinned Emscripten SDK
        run: |
          git clone --branch 5.0.2 --depth 1 \
            https://github.com/emscripten-core/emsdk.git build/emsdk
          build/emsdk/emsdk install 5.0.2
          build/emsdk/emsdk activate 5.0.2

      - name: Build and test application
        run: |
          source build/emsdk/emsdk_env.sh
          make app-test

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Render READMEs and add application
        env:
          JEKYLL_ENV: production
        run: |
          bundle exec jekyll build \
            --baseurl "${{ steps.pages.outputs.base_path }}" \
            --destination build/pages
          mkdir -p build/pages/app
          cp -R app/dist/. build/pages/app/
          test -s build/pages/index.html
          test -s build/pages/js/index.html
          test -s build/pages/py/index.html
          test -s build/pages/app/index.html
          test ! -e build/pages/archbird

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: build/pages

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: read
      pages: write
      id-token: write
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy Pages artifact
        id: deployment
        uses: actions/deploy-pages@v4
